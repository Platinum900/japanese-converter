<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日文校對工具 (API版)</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        textarea { width: 100%; height: 150px; font-size: 16px; padding: 10px; border: 1px solid #ccc; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 10px; background: #007bff; color: white; border: none; border-radius: 5px; font-size: 16px; }
        #output { margin-top: 20px; line-height: 2.5; font-size: 18px; }
    </style>
</head>
<body>
    <div class="container">
        <h3>日文拼音校對</h3>
        <textarea id="input" placeholder="請在此輸入日文..."></textarea>
        <button onclick="getReading()">生成拼音</button>
        <div id="output"></div>
    </div>

    <script>
        async function getReading() {
            const text = document.getElementById('input').value;
            const output = document.getElementById('output');
            
            // 這裡貼上你的 GAS URL
            const GAS_URL = "https://script.google.com/macros/s/AKfycbwNmIrpThvGamraSWi8a0_Go2xExloaZ_TRvNI3SCNWcpeZKSXYjtdPEh3_Xq4ytQ7u_w/exec"; 
            
            output.innerText = "正在查詢拼音中...";

            try {
                const response = await fetch(`${GAS_URL}?text=${encodeURIComponent(text)}`);
                const data = await response.json();
                
                // 顯示結果
                output.innerHTML = `<strong>拼音結果：</strong><br>${data.hiragana}`;
            } catch (e) {
                output.innerText = "查詢發生錯誤，請確認網路與 GAS URL 設定。";
            }
        }
    </script>
</body>
</html>
