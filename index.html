<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            font-family: 'Helvetica Neue', sans-serif; 
            padding: 40px; 
            background: #f9f9f9; 
        }
        textarea { 
            width: 100%; 
            height: 150px; 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid #ccc; 
        }
        button { 
            margin-top: 10px; 
            padding: 10px 30px; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
        }
        #output { 
            margin-top: 30px; 
            line-height: 2.8; 
            font-size: 24px; 
            white-space: pre-wrap; 
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
        }
        ruby {
            ruby-position: over; /* force hiragana at overhead position */
            ruby-align: center;
            border-bottom: 1px dashed #c27945; /* brown color dashed line*/
            padding-bottom: 2px;              /* distance between word and dashed line */
        }
        rt { 
            font-size: 0.55em;         
            color: #8B4513;            
            background-color: #FFE4B5; 
            padding: 0 4px;            
            border-radius: 4px;        
            line-height: 1;            
        }
        #historyList {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 200px; 
            
            /* when height of content over 200px，it becomes scrollable */
            overflow-y: auto; 
            
            /* boarder and background for good appearance */
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #fafafa;

            -webkit-overflow-scrolling: touch; /* more smooth in phone */
        }
        .delete-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px; 
            height: 28px;
            border-radius: 50%;
            padding: 0;
            border: 1px solid #ddd;
            background: transparent;
            cursor: pointer;
            color: #999;
            font-size: 14px; /* adjust the size of cross sign for easier press */
            transition: all 0.2s;
        }

        .delete-btn:hover {
            background: #ffe0e0;
            color: #d32f2f;
            border-color: #d32f2f;
        }
    </style>
</head>
<body>
    <div id="historySection">
        <h3>歷史紀錄</h3>
        <ul id="historyList" style="list-style: none; padding: 0;"></ul>
    </div>

    <h2>日文文章</h2>
    <textarea id="input" placeholder="請貼上日文文章..."></textarea>
    <button onclick="convert()">轉換</button>

    <div id="output"></div>

    <script>
        async function convert() {
            const text = document.getElementById('input').value;
            if (!text.trim()) return;

            const output = document.getElementById('output');
            const API_URL = "https://japanese-kanji-api-service.onrender.com/convert";

            output.innerHTML = "轉換中...";

            try {
                const response = await fetch(`${API_URL}?text=${encodeURIComponent(text)}`);
                const data = await response.json();
                
                output.innerHTML = "";
                data.lines.forEach(line => {
                    let div = document.createElement('div');
                    div.style.marginBottom = "20px";
                    
                    line.forEach(item => {
                        if (item.hira && item.orig !== item.hira) {
                            div.innerHTML += `<ruby>${item.orig}<rt>${item.hira}</rt></ruby>`;
                        } else {
                            div.innerHTML += item.orig;
                        }
                    });
                    output.appendChild(div);
                });
                
                // Move to here and make sure only save once (no duplicate record)
                saveToHistory(text);
            } catch (err) {
                output.innerHTML = "轉換失敗，請檢查網路連線。";
            }
        }

        function saveToHistory(text) {
            let history = JSON.parse(localStorage.getItem('myHistory') || '[]');
            history = [text, ...history.filter(item => item !== text)].slice(0, 10);
            localStorage.setItem('myHistory', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            const history = JSON.parse(localStorage.getItem('myHistory') || '[]');
            
            list.innerHTML = "";
            history.forEach((text, index) => {
                let li = document.createElement('li');
                li.style.display = "flex";
                li.style.justifyContent = "space-between";
                li.style.padding = "8px";
                li.style.borderBottom = "1px solid #eee";
                li.style.cursor = "pointer";
                
                // Part : Show words
                let span = document.createElement('span');
                span.textContent = text.substring(0, 20) + (text.length > 20 ? '...' : '');
                span.onclick = () => {
                    document.getElementById('input').value = text;
                    convert();
                };
                
                // Button for delete
                let btn = document.createElement('button');
                btn.textContent = "✕";
                btn.className = "delete-btn";
                btn.title = "刪除此紀錄";
                btn.onclick = (e) => {
                    e.stopPropagation();
                    deleteHistoryItem(index);
                };
                
                li.appendChild(span);
                li.appendChild(btn);
                list.appendChild(li);
            });
        }

        function deleteHistoryItem(index) {
            let history = JSON.parse(localStorage.getItem('myHistory') || '[]');
            history.splice(index, 1);
            localStorage.setItem('myHistory', JSON.stringify(history));
            renderHistory();
        }

        window.onload = renderHistory;
    </script>
</body>
</html>
