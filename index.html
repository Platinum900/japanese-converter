<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日文閱讀校對工具</title>
    <script src="https://cdn.jsdelivr.net/npm/kuromoji@0.1.2/build/kuromoji.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f4f4f9; margin: 0; }
        .container { max-width: 600px; margin: auto; background: white; padding: 15px; border-radius: 8px; }
        textarea { width: 100%; height: 120px; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .controls { display: flex; gap: 10px; margin-top: 10px; }
        .btn { flex: 1; padding: 12px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; color: white; }
        
        #output { 
            margin-top: 20px; 
            font-size: 1.2rem; 
            line-height: 2.2; 
            white-space: pre-wrap; 
            word-wrap: break-word;
        }
        
        /* 核心 Ruby 垂直排版修正 */
        ruby {
            display: inline-ruby; /* 確保瀏覽器將其視為 ruby 容器 */
            ruby-position: over;   /* 強制拼音在上方 */
            margin: 0 2px;
            vertical-align: middle;
        }

        rt {
            cursor: text;
            color: #d35400;
            font-size: 0.6em;      /* 拼音字體大小 */
            font-weight: bold;
            background: #fff3cd;
            border-bottom: 1px solid #ffc107;
            padding: 0 2px;
            border-radius: 2px;
            /* 關鍵：調整拼音與漢字的間距 */
            line-height: 1;
        }
        .hidden-rt rt { display: none; }
    </style>
</head>
<body>

<div class="container">
    <textarea id="input" placeholder="貼上日文文章..."></textarea>
    <div class="controls">
        <button class="btn" style="background:#007bff;" onclick="processText()">生成</button>
        <button class="btn" style="background:#6c757d;" onclick="toggleRuby()">開關拼音</button>
    </div>
    <div id="output"></div>
</div>

<script>
    // ... (保留之前的 JS 邏輯不變)
    let tokenizer;
    kuromoji.builder({ dicPath: "https://cdn.jsdelivr.net/npm/kuromoji@0.1.2/dict/" }).build((err, t) => { tokenizer = t; });

    async function processText() {
        const text = document.getElementById('input').value;
        const output = document.getElementById('output');
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwNmIrpThvGamraSWi8a0_Go2xExloaZ_TRvNI3SCNWcpeZKSXYjtdPEh3_Xq4ytQ7u_w/exec"; // 務必換成你最新的 URL

        output.innerHTML = "正在處理中...";

        try {
            const response = await fetch(`${GAS_URL}?text=${encodeURIComponent(text)}`);
            const data = await response.json();
            
            // 顯示結果
            output.innerHTML = `<strong>原文：</strong> ${data.original}<br>` + 
                            `<strong>拼音：</strong> ${data.hiragana}`;
        } catch (e) {
            output.innerHTML = "查詢失敗，請檢查網路連線。";
        }
    }

    function toggleRuby() {
        document.getElementById('output').classList.toggle('hidden-rt');
    }
</script>
</body>
</html>
