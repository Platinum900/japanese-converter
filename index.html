<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            font-family: 'Helvetica Neue', sans-serif; 
            padding: 40px; 
            background: #f9f9f9; 
        }
        textarea { 
            width: 100%; 
            height: 150px; 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid #ccc; 
        }
        button { 
            margin-top: 10px; 
            padding: 10px 30px; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
        }
        #output { 
            margin-top: 30px; 
            line-height: 2.8; 
            font-size: 24px; 
            white-space: pre-wrap; 
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
        }
        ruby {
            ruby-position: over; /* 強制在上方 */
            ruby-align: center;
        }
        rt { 
            font-size: 0.55em;         /* 字體稍微調大一點點，讓淺橙黃底色更好看 */
            color: #8B4513;            /* 咖啡色字體 */
            background-color: #FFE4B5; /* 淺橙黃色 (Moccasin)，這是一種溫柔的奶油橘色 */
            padding: 0 4px;            /* 左右留白加寬，讓底色更明顯 */
            border-radius: 4px;        /* 圓角處理 */
            line-height: 1;            /* 確保底色高度適中 */
        }
    </style>
</head>
<body>
    <h2>日文文章 / 歌詞標音工具</h2>
    <textarea id="input" placeholder="請貼上日文歌詞..."></textarea>
    <button onclick="convert()">轉換標註</button>

    <div id="output"></div>

    <script>
    async function convert() {
        const text = document.getElementById('input').value;
        const output = document.getElementById('output');
        const API_URL = "https://japanese-kanji-api-service.onrender.com/convert";

        const response = await fetch(`${API_URL}?text=${encodeURIComponent(text)}`);
        const data = await response.json();
        
        output.innerHTML = "";
        // 修改你 index.html 裡面的 render 部分：
        data.lines.forEach(line => {
            let div = document.createElement('div');
            div.style.marginBottom = "20px"; // 行距
            
            line.forEach(item => {
                // 判斷：只要有拼音，就一律加上 <ruby>
                // 這樣漢字上方會顯示平假名，如果 orig 本身就是平假名，ruby 效果會重疊，所以加個檢查
                if (item.hira && item.orig !== item.hira) {
                    div.innerHTML += `<ruby>${item.orig}<rt>${item.hira}</rt></ruby>`;
                } else {
                    div.innerHTML += item.orig;
                }
            });
            output.appendChild(div);
        });
    }
    </script>
</body>
</html>
